<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Des-Enfoque | Proyecto Génesis</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 0;
      background: #0b0b0b;
      color: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.6rem;
    }
    p {
      font-size: 1.15rem;
      max-width: 320px;
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }
    .qr-box {
      background: #ffffff;
      padding: 1.2rem;
      border-radius: 12px;
      margin-bottom: 1.3rem;
    }
    img {
      width: 180px;
      height: 180px;
      object-fit: contain;
    }
    footer {
      font-size: 0.85rem;
      opacity: 0.6;
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <h1>Proyecto Génesis</h1>
  <p>Esto no es una tienda.<br>Es el nacimiento de <strong>Des-Enfoque</strong>.</p>
<form
  action="https://assets.mailerlite.com/js/universal.js"
  method="POST"
  onsubmit="handleSubmit(event)"
  style="max-width:420px;margin:0 auto;text-align:center;"
>
  <input
    type="email"
    name="fields[email]"
    placeholder="tu correo"
    required
    style="width:100%;padding:14px;background:none;border:1px solid #333;color:#fff;"
  >

  <button
    type="submit"
    style="margin-top:24px;padding:14px 32px;background:none;border:1px solid #fff;color:#fff;cursor:pointer;"
  >
    Solicitar acceso
  </button>
</form>

<script>
  function handleSubmit(e) {
    e.preventDefault();
    fetch(e.target.action, {
      method: "POST",
      body: new FormData(e.target),
      mode: "no-cors"
    });
    window.location.href = "confirmacion.html";
  }
</script>

  <p>Escanea el código para acceder al ritual creativo y al lanzamiento.</p>
  <footer>© Des-Enfoque 2025</footer>
</body>
</html>
